# Batch dataset generation for transparent object reconstruction training
# Usage: python render_dataset.py --conf configs/dataset.yaml

Project: RefractiveCorresDataset
project_name: dataset_release_example
output_folder: ./result

ior_range: [1.3, 1.6]
envnum_per_shape: 4
camnum_per_env: 6

Tracer:
  backend: mitsuba

Scene:
  type: CustomScene
  # Expected structure:
  # dataset_resources/
  #   shape/{train_shape.txt,test_shape.txt,...}
  #   env_map/{train_env.txt,test_env.txt,...}
  source_path: ./dataset_resources
  scale: 1.0
  integrator:
    type: path
    max_depth: 20
  element:
    - type: transparent_mesh
      mesh_filename: holder.ply
      IoR: 1.5
    - type: envmap_light
      envmap_filename: holder.exr
      intensity: 1.0
      z_up: true

Camera:
  type: perspective
  fov: 80
  sampler:
    type: independent
    sample_count: 512
  film:
    type: hdrfilm
    width: 512
    height: 512
    rfilter:
      type: tent
    pixel_format: rgb

CamPose:
  type: RandomCamPose
  target: [0, 0, 0]
  theta_range: [40, 110]
  r_range: [1.8, 2.2]
  shift: [0, 0, 0]
